apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "remnaware.fullname" . }}
  labels:
    {{- include "remnaware.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  replicas: {{ .Values.backend.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "remnaware.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "remnaware.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - name: http-app
              containerPort: {{ .Values.config.appPort }}
            - name: http-metrics
              containerPort: {{ .Values.config.metricsPort }}
          
          # Загружаем все переменные из ConfigMap и Secret
          envFrom:
            - configMapRef:
                name: {{ include "remnaware.fullname" . }}-config
            # Используем хелпер для определения имени секрета
            - secretRef:
                name: {{ include "remnaware.secretName" . }}
          
          # Явное подключение к БД, созданной CNPG
          env:
            {{- if .Values.cnpg.enabled }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "remnaware.fullname" . }}-db-app
                  key: uri
            {{- end }}
          
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
          
          livenessProbe:
            httpGet:
              path: /health
              port: http-metrics
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          
          readinessProbe:
            httpGet:
              path: /health
              port: http-metrics
            initialDelaySeconds: 5
            periodSeconds: 10