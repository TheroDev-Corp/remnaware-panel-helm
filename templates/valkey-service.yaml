apiVersion: v1
kind: Service
metadata:
  name: {{ include "remnaware.fullname" . }}-valkey
  labels:
    {{- include "remnaware.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 6379
      targetPort: tcp-valkey
      protocol: TCP
      name: tcp-valkey
  selector:
    app.kubernetes.io/name: {{ include "remnaware.name" . }}-valkey
    app.kubernetes.io/instance: {{ .Release.Name }}