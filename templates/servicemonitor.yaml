{{- if .Values.serviceMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "remnaware.fullname" . }}
  labels:
    {{- include "remnaware.labels" . | nindent 4 }}
    {{- with .Values.serviceMonitor.additionalLabels }}
      {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "remnaware.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  endpoints:
    - port: http-metrics
      path: /metrics
      interval: {{ .Values.serviceMonitor.interval }}
      scrapeTimeout: {{ .Values.serviceMonitor.scrapeTimeout }}
      {{- if .Values.serviceMonitor.basicAuth.enabled }}
      basicAuth:
        username:
          name: {{ include "remnaware.secretName.metrics" . }}
          key: METRICS_USER
        password:
          name: {{ include "remnaware.secretName.metrics" . }}
          key: METRICS_PASS
      {{- end }}